<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Fret Board Quest フレクエ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
<style>

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
    --bg: #020210;
    --panel: #06061c;
    --border: #c8a84b;
    --gold: #f5d070;
    --gold2: #ffd700;
    --ok: #4ade80;
    --ng: #f87171;
    --xp: #818cf8;
    --dim: #3a3a60;
    --dq-frame: #c8a84b;
    --dq-frame2: #7a5c1a;
    --dq-inner: #e8c870;
}

body {
    font-family: 'DotGothic16', -apple-system, sans-serif;
    background: var(--bg);
    background-image:
        repeating-linear-gradient(0deg, rgba(0,0,20,0.08) 0px, rgba(0,0,20,0.08) 1px, transparent 1px, transparent 4px);
    color: #eeeeff;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 14px 36px;
    padding-top: max(10px, env(safe-area-inset-top));
    padding-bottom: max(36px, env(safe-area-inset-bottom));
    padding-left: max(14px, env(safe-area-inset-left));
    padding-right: max(14px, env(safe-area-inset-right));
    gap: 8px;
    overflow-x: hidden;
}

/* ══ Header ══════════════════════════════════════════════════ */
.app-header {
    display: flex; align-items: center; justify-content: space-between;
    width: 100%; max-width: 520px; padding: 6px 10px;
    flex-shrink: 0;
    background: #04041a;
    border: 3px solid var(--dq-frame);
    box-shadow: inset 0 0 0 1px var(--dq-frame2), 0 4px 14px rgba(0,0,0,0.8);
    border-radius: 4px;
}
.title-wrap { display: flex; align-items: center; gap: 7px; }
.app-title {
    font-size: 1.1rem; font-weight: 400;
    color: var(--gold2);
    text-shadow: 2px 2px 0 #5a3c00, 0 0 14px rgba(255,215,0,0.5);
    letter-spacing: 0.06em;
}
.version-tag { font-size: 0.55rem; color: #44446a; font-weight: 400; letter-spacing: 0.04em; }
.header-btns { display: flex; gap: 6px; align-items: center; }
.icon-btn {
    width: 38px; height: 38px; border-radius: 3px;
    border: 2px solid var(--dq-frame); background: #04041a;
    font-size: 0.9rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--gold); transition: all 0.18s; text-decoration: none;
    box-shadow: inset 0 0 0 1px var(--dq-frame2), 0 2px 8px rgba(0,0,0,0.6);
    touch-action: manipulation;
}
.icon-btn:hover { background: #0a0a30; box-shadow: inset 0 0 0 1px var(--dq-frame2), 0 0 12px rgba(200,168,75,0.5); }
.study-link {
    padding: 6px 12px; border-radius: 3px;
    border: 2px solid var(--dq-frame); background: #04041a;
    color: var(--gold); font-size: 0.72rem; font-weight: 400;
    text-decoration: none; transition: all 0.18s; letter-spacing: 0.03em;
    box-shadow: inset 0 0 0 1px var(--dq-frame2), 0 2px 8px rgba(0,0,0,0.6);
    touch-action: manipulation;
}
.study-link:hover { background: #0a0a30; }

/* ══ Stage Select ════════════════════════════════════════════ */
#stage-select {
    display: flex; flex-direction: column; align-items: center;
    width: 100%; max-width: 520px; gap: 10px;
}
.ss-hero {
    text-align: center;
    padding: 6px 0 2px;
}
.ss-hero-title {
    font-size: 1rem; font-weight: 400; color: var(--gold2);
    letter-spacing: 0.06em;
    text-shadow: 2px 2px 0 #5a3c00, 0 0 20px rgba(255,215,0,0.4);
}
.ss-hero-sub { font-size: 0.62rem; color: #44446a; margin-top: 4px; }

.ss-section {
    width: 100%;
    background: #04041a;
    border: 3px solid var(--dq-frame);
    box-shadow: inset 0 0 0 1px var(--dq-frame2), 0 4px 18px rgba(0,0,0,0.7);
    border-radius: 4px;
    padding: 12px 12px;
}
.ss-section-title {
    font-size: 0.68rem; color: var(--gold);
    letter-spacing: 0.08em;
    font-weight: 400; margin-bottom: 10px;
    text-shadow: 1px 1px 0 #5a3c00;
}
.ss-grid { display: grid; gap: 7px; }
.ss-grid-3 { grid-template-columns: repeat(3, 1fr); }
.ss-grid-2 { grid-template-columns: repeat(2, 1fr); }

.ss-btn {
    display: flex; flex-direction: column; align-items: center;
    padding: 10px 5px 9px; border-radius: 3px;
    border: 2px solid var(--dq-frame);
    background: #06061e;
    cursor: pointer; transition: all 0.12s; gap: 4px;
    touch-action: manipulation;
    box-shadow: inset 0 0 0 1px var(--dq-frame2), 0 3px 10px rgba(0,0,0,0.6);
}
.ss-btn:hover {
    background: #0a0a2e;
    box-shadow: inset 0 0 0 1px var(--dq-frame2), 0 0 14px rgba(200,168,75,0.4);
}
.ss-label {
    font-size: 0.9rem; font-weight: 400;
    color: var(--c, var(--gold)); line-height: 1;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.8);
}
.ss-sub  { font-size: 0.56rem; color: #4a4a7a; font-weight: 400; }
.ss-best { font-size: 0.53rem; color: #2a2a48; margin-top: 1px; }
.ss-best.has-score { color: var(--gold); }

/* ══ Stage Bar (in-game) ══════════════════════════════════════ */
#game-area { gap: 8px; }

.stage-bar {
    display: flex; align-items: center; justify-content: space-between;
    width: 100%; max-width: 520px;
    padding: 6px 12px;
    background: #04041a;
    border: 3px solid var(--dq-frame);
    border-radius: 4px;
    box-shadow: inset 0 0 0 1px var(--dq-frame2), 0 2px 10px rgba(0,0,0,0.7);
}
.stage-bar-label { font-size: 0.68rem; color: #6668aa; font-weight: 400; }
.stage-bar-name  { font-size: 0.75rem; font-weight: 400; color: var(--gold); }
.stage-change-btn {
    padding: 4px 10px; border-radius: 2px;
    border: 2px solid var(--dq-frame); background: #06061e;
    color: var(--gold); font-size: 0.65rem; font-weight: 400;
    font-family: 'DotGothic16', sans-serif;
    cursor: pointer; transition: all 0.18s; touch-action: manipulation;
    box-shadow: inset 0 0 0 1px var(--dq-frame2);
}
.stage-change-btn:hover { background: #0a0a2e; }

/* ══ HUD ══════════════════════════════════════════════════════ */
.hud {
    display: flex; align-items: center; justify-content: space-between;
    width: 100%; max-width: 520px;
    padding: 7px 12px;
    background: #04041a;
    border: 3px solid var(--dq-frame);
    border-radius: 4px; gap: 10px;
    box-shadow: inset 0 0 0 1px var(--dq-frame2), 0 4px 18px rgba(0,0,0,0.8);
}
.hud-lives { font-size: 1.1rem; letter-spacing: 1px; min-width: 68px; }
.hud-center { display: flex; flex-direction: column; align-items: center; gap: 5px; flex-shrink: 0; }
.level-badge {
    border: 2px solid var(--dq-frame);
    box-shadow: inset 0 0 0 1px var(--dq-frame2);
    background: #04041a;
    color: var(--gold2); font-weight: 400; font-size: 0.72rem;
    padding: 2px 10px; border-radius: 2px; letter-spacing: 0.1em;
    text-shadow: 1px 1px 0 #5a3c00;
}
.xp-wrap { display: flex; flex-direction: column; gap: 2px; width: 86px; }
.xp-track { height: 6px; border-radius: 1px; overflow: hidden; background: #010110; border: 1px solid var(--dq-frame2); }
.xp-fill {
    height: 100%; border-radius: 1px; width: 0%;
    background: linear-gradient(90deg, #6060cc, #9090ff);
    transition: width 0.75s cubic-bezier(0.34,1.56,0.64,1);
}
.xp-label { font-size: 0.5rem; color: #33335a; text-align: center; }
.hud-score { text-align: right; }
.score-label { font-size: 0.5rem; color: #33335a; letter-spacing: 0.1em; }
.score-val { font-size: 1.1rem; font-weight: 400; color: var(--gold2); line-height: 1.1; text-shadow: 1px 1px 0 #5a3c00; }
.best-label { font-size: 0.5rem; color: #33335a; margin-top: 1px; }

/* ══ Enemy Stage ══════════════════════════════════════════════ */
.enemy-stage {
    position: relative; width: 100%; max-width: 520px; min-height: 300px;
    background:
        linear-gradient(180deg,
            #1a3a99 0%, #2255cc 30%, #4488ee 48%,
            #558811 50%, #448800 65%, #336600 100%);
    border: 3px solid var(--dq-frame); border-radius: 4px;
    display: flex; flex-direction: column; align-items: center;
    justify-content: flex-start; gap: 4px; padding: 10px 14px 66px;
    overflow: hidden;
    box-shadow: inset 0 0 0 1px var(--dq-frame2), 0 8px 36px rgba(0,0,0,0.85);
    transition: border-color 0.6s ease, box-shadow 0.6s ease;
}
/* 雲の装飾 */
.enemy-stage::before {
    content: ''; position: absolute; top: 14px; left: 8%; width: 72px; height: 22px;
    background: rgba(220,235,255,0.82); border-radius: 12px;
    box-shadow: 110px 8px 0 rgba(220,235,255,0.72), 220px -2px 0 rgba(220,235,255,0.68), 330px 5px 0 rgba(220,235,255,0.6);
    pointer-events: none; z-index: 1;
}
/* 地面ライン */
.stage-ground {
    position: absolute; bottom: 62px; left: 0; right: 0; height: 3px;
    background: #2a5500;
    z-index: 2;
}
.wave-badge {
    font-size: 0.6rem; color: #eeeeff; letter-spacing: 0.1em; text-transform: uppercase;
    font-weight: 400; z-index: 3; background: rgba(0,0,30,0.55);
    padding: 2px 8px; border-radius: 2px;
}
.boss-chip {
    display: inline-block;
    background: #cc2200;
    color: #fff; font-size: 0.54rem; font-weight: 400;
    padding: 2px 7px; border-radius: 2px; letter-spacing: 0.09em; margin-left: 5px;
    animation: boss-pulse 1.1s ease-in-out infinite;
    border: 1px solid #ff6644;
}
@keyframes boss-pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.65;transform:scale(0.93)} }

/* ══ Speech Bubble (DQスタイルダイアログ) ═════════════════════ */
.speech-bubble {
    position: relative;
    background: #04041a;
    color: #eeeeff; border: 3px solid var(--dq-frame); border-radius: 3px;
    padding: 8px 16px; font-size: 0.82rem; font-weight: 400;
    max-width: 320px; width: 92%; text-align: center; line-height: 1.6;
    min-height: 44px; display: flex; align-items: center; justify-content: center;
    box-shadow: inset 0 0 0 1px var(--dq-frame2), 0 4px 16px rgba(0,0,0,0.8);
    z-index: 4;
}
.speech-bubble::after { display: none; }
.speech-bubble::before { display: none; }
@keyframes bubble-pop {
    0%{transform:scale(0.8);opacity:0} 65%{transform:scale(1.03);opacity:1}
    100%{transform:scale(1)}
}
.speech-bubble.pop { animation: bubble-pop 0.25s ease-out forwards; }

/* ══ Enemy Sprite ═════════════════════════════════════════════ */
.enemy-sprite {
    display: flex; align-items: flex-end; justify-content: center;
    position: relative; z-index: 3;
    filter: drop-shadow(0 10px 35px rgba(0,0,0,0.85));
    flex-shrink: 0; margin-top: 10px;
}
.enemy-sprite svg { display: block; }
.enemy-sprite.idle { animation: enemy-bob 2.7s ease-in-out infinite; }
@keyframes enemy-bob { 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-11px) scale(1.03)} }
.enemy-sprite.hit { animation: enemy-hit 0.55s ease-out forwards; }
@keyframes enemy-hit {
    0%  {transform:translateX(0) scale(1); filter:drop-shadow(0 10px 35px rgba(0,0,0,0.85)) brightness(1)}
    20% {transform:translateX(-18px) scale(0.84); filter:drop-shadow(0 0 36px #fff) brightness(9)}
    42% {transform:translateX(15px) scale(1.14); filter:drop-shadow(0 0 18px var(--gold)) brightness(2.8)}
    62% {transform:translateX(-7px); filter:brightness(1.6)}
    80% {transform:translateX(5px);  filter:brightness(1.15)}
    100%{transform:translateX(0) scale(1); filter:drop-shadow(0 10px 35px rgba(0,0,0,0.85)) brightness(1)}
}
.enemy-sprite.defeat { animation: enemy-defeat 0.95s ease-out forwards; }
@keyframes enemy-defeat {
    0%  {transform:scale(1) rotate(0deg);opacity:1}
    22% {transform:scale(1.65) rotate(22deg);filter:brightness(12) saturate(0)}
    55% {transform:scale(0.48) rotate(-12deg);opacity:0.5}
    85% {transform:scale(0.12) rotate(32deg);opacity:0.1}
    100%{transform:scale(0) rotate(42deg);opacity:0}
}
.enemy-name-plate {
    position: absolute; bottom: 8px; left: 0; right: 0;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    padding: 0 16px; z-index: 4;
}
.enemy-name-text {
    font-size: 0.8rem; font-weight: 400; color: #eeeeff; letter-spacing: 0.06em;
    background: #04041a; border: 2px solid var(--dq-frame); border-radius: 2px;
    padding: 2px 16px;
    box-shadow: inset 0 0 0 1px var(--dq-frame2);
}
.hp-wrap { display: flex; flex-direction: column; gap: 2px; width: 200px; }
.hp-labels { display: flex; justify-content: space-between; font-size: 0.54rem; color: #44448a; }
.hp-track { height: 10px; background: #010110; border-radius: 1px; border: 1px solid var(--dq-frame2); overflow: hidden; }
.hp-fill { height: 100%; border-radius: 1px; transition: width 0.35s ease-out, background 0.35s; }

/* ══ Battle Message ═══════════════════════════════════════════ */
.battle-msg {
    display: flex; flex-direction: column; align-items: center;
    gap: 3px; min-height: 58px; justify-content: center;
    width: 100%; max-width: 520px;
}
.combo-display { min-height: 1.7rem; font-weight: 900; }
.result-line { font-size: 0.95rem; font-weight: 700; min-height: 1.3em; }
.result-line.ok   { color: var(--ok); text-shadow: 0 0 18px rgba(74,222,128,0.65); }
.result-line.miss { color: var(--ng); text-shadow: 0 0 14px rgba(248,113,113,0.45); }

/* ══ Fretboard ════════════════════════════════════════════════ */
.fretboard-container { width: 100%; max-width: 920px; overflow-x: auto; padding-bottom: 8px; -webkit-overflow-scrolling: touch; }
.fretboard-inner { min-width: 680px; }
.fret-num-row { display: flex; margin-bottom: 4px; }
.fret-num-cell { text-align: center; font-size: 0.58rem; color: #44448a; flex: 1; }
.fret-num-cell.open-col { flex: 0.6; }
.fretboard-grid {
    display: flex; flex-direction: column;
    background: #3a2006; border-radius: 2px;
    padding: 8px 0; border: 3px solid var(--dq-frame);
    box-shadow: inset 0 0 0 1px var(--dq-frame2), 0 4px 20px rgba(0,0,0,0.8);
}
.string-row { display: flex; align-items: center; height: 44px; }
.fret-cells { display: flex; flex: 1; position: relative; }
.fret-cells::before { content: ''; position: absolute; left: 0; right: 0; top: 50%; transform: translateY(-50%); pointer-events: none; z-index: 0; }
.string-row:nth-child(1) .fret-cells::before { height: 1px;   background: #e74c3c; }
.string-row:nth-child(2) .fret-cells::before { height: 1.5px; background: #e8853d; }
.string-row:nth-child(3) .fret-cells::before { height: 2px;   background: #f1c40f; }
.string-row:nth-child(4) .fret-cells::before { height: 2.5px; background: #2ecc71; }
.string-row:nth-child(5) .fret-cells::before { height: 3px;   background: #3498db; }
.string-row:nth-child(6) .fret-cells::before { height: 4px;   background: #9b59b6; }
.fret-cell { flex: 1; height: 44px; display: flex; align-items: center; justify-content: center; position: relative; border-right: 2px solid #b08040; z-index: 1; }
.fret-cell.open-col { flex: 0.6; border-right: 5px solid #888; }
.dot-row { display: flex; margin-top: 4px; height: 14px; }
.dot-cell { flex: 1; display: flex; align-items: center; justify-content: center; gap: 4px; }
.dot-cell.open-col { flex: 0.6; }
.fret-dot { width: 7px; height: 7px; border-radius: 50%; background: #684a14; }

/* ══ Note Indicator ═══════════════════════════════════════════ */
.note-ind {
    width: 30px; height: 30px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.62rem; font-weight: 700;
    position: relative; z-index: 2;
    opacity: 0; pointer-events: none; transition: opacity 0.12s;
}
.note-ind.show    { opacity: 1; }
.note-ind.target  { opacity:1; background:var(--gold); color:#08081a; box-shadow:0 0 18px rgba(224,168,53,1),0 0 38px rgba(224,168,53,0.45); }
.note-ind.correct { opacity:1; background:var(--ok);   color:#08081a; box-shadow:0 0 16px rgba(74,222,128,0.85); }
.note-ind.wrong   { opacity:1; background:var(--ng);   color:#08081a; box-shadow:0 0 12px rgba(248,113,113,0.55); }
@keyframes pop { 0%{transform:scale(0.2)} 65%{transform:scale(1.38)} 100%{transform:scale(1)} }
.note-ind.pop { animation: pop 0.28s ease-out; }

/* ══ Choices ══════════════════════════════════════════════════ */
.choices-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 7px; width: 100%; max-width: 480px; }
.choice-btn {
    padding: 14px 4px; border-radius: 3px;
    border: 3px solid var(--dq-frame);
    background: #04041a;
    color: #eeeeff; font-size: 1rem; font-weight: 400;
    font-family: 'DotGothic16', sans-serif;
    cursor: pointer; transition: all 0.1s;
    box-shadow: inset 0 0 0 1px var(--dq-frame2), 0 4px 10px rgba(0,0,0,0.7);
    touch-action: manipulation; user-select: none; -webkit-user-select: none; min-height: 52px;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.8);
}
.choice-btn:hover:not(:disabled) {
    background: #0a0a30; color: var(--gold2);
    text-shadow: 1px 1px 0 #5a3c00;
}
.choice-btn.ok { background:#042210; border-color:var(--ok); color:var(--ok); box-shadow:inset 0 0 0 1px #1a5a30, 0 0 14px rgba(74,222,128,0.3); }
.choice-btn.ng { background:#220404; border-color:var(--ng); color:var(--ng); box-shadow:inset 0 0 0 1px #5a1a1a, 0 0 10px rgba(248,113,113,0.2); }
.choice-btn:disabled { cursor: default; }

/* ══ Effects ══════════════════════════════════════════════════ */
.particle { position:fixed; pointer-events:none; z-index:9999; border-radius:50%; animation:ptcl 0.95s ease-out forwards; }
@keyframes ptcl { 0%{transform:translate(0,0) scale(1);opacity:1} 100%{transform:translate(var(--dx),var(--dy)) scale(0.04);opacity:0} }
.star-particle { position:fixed; pointer-events:none; z-index:9999; font-size:1.1rem; animation:star-fly 1s ease-out forwards; }
@keyframes star-fly { 0%{transform:translate(0,0) scale(1) rotate(0deg);opacity:1} 100%{transform:translate(var(--dx),var(--dy)) scale(0) rotate(360deg);opacity:0} }
.float-txt { position:fixed; font-weight:900; pointer-events:none; z-index:9999; transform:translateX(-50%); animation:float-up 1.1s ease-out forwards; white-space:nowrap; text-shadow:0 2px 14px rgba(0,0,0,1); }
@keyframes float-up { 0%{transform:translateX(-50%) translateY(0);opacity:1} 100%{transform:translateX(-50%) translateY(-90px);opacity:0} }
.body-flash { animation:body-flash 0.55s ease-out; }
@keyframes body-flash { 0%,100%{background-color:var(--bg)} 30%{background-color:#2c0808} 60%{background-color:#180505} }
.shake-el { animation:shake 0.42s ease-out; }
@keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-10px)} 40%{transform:translateX(10px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }
.overlay-anim { position:fixed; inset:0; z-index:9998; display:flex; flex-direction:column; align-items:center; justify-content:center; pointer-events:none; animation:ov-fade 2s ease-out forwards; }
@keyframes ov-fade { 0%{opacity:0} 18%{opacity:1} 65%{opacity:1} 100%{opacity:0} }
.overlay-text {
    font-size:2.2rem; font-weight:400; font-family:'DotGothic16',sans-serif;
    animation:ov-pop 2s ease-out forwards; text-shadow:3px 3px 0 rgba(0,0,0,0.7);
    border: 4px solid var(--dq-frame); padding: 14px 28px; background: #04041a;
    box-shadow: inset 0 0 0 1px var(--dq-frame2);
}
@keyframes ov-pop { 0%{transform:scale(0.4)} 28%{transform:scale(1.08)} 45%{transform:scale(0.97)} 100%{transform:scale(1)} }

/* ══ Timer Bar ════════════════════════════════════════════════ */
.timer-bar-wrap {
    width: 100%; max-width: 520px;
    display: flex; align-items: center; gap: 8px; height: 18px;
}
.timer-bar-fill {
    flex: 1; height: 6px; border-radius: 1px;
    background: var(--ok); transition: none;
    border: 1px solid #1a6630;
}
.timer-label {
    font-size: 0.58rem; color: #44448a; font-weight: 400;
    min-width: 36px; text-align: right; font-family: 'DotGothic16', monospace;
}

/* ══ Weakness Stats ═══════════════════════════════════════════ */
.stats-content { display: flex; flex-direction: column; gap: 7px; }
.stats-empty { font-size: 0.64rem; color: #2a2a48; text-align: center; padding: 6px 0; }
.stats-row {
    display: grid;
    grid-template-columns: 58px 26px 1fr 38px 44px;

<script>
// ── 定数 ─────────────────────────────────────────────────────
const NOTES      = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const OPEN_NOTES = [4,11,7,2,9,4];
const DOT_FRETS  = new Set([3,5,7,9,12]);
const NUM_FRETS  = 12;
const BASE_FREQS = [329.63,246.94,196.00,146.83,110.00,82.41];
const STR_JP     = ['1弦','2弦','3弦','4弦','5弦','6弦'];
const STR_OPEN   = ['High E','B','G','D','A','Low E'];
const STR_COLORS = ['#e74c3c','#e8853d','#f1c40f','#2ecc71','#3498db','#9b59b6'];
const getNote    = (s,f) => NOTES[(OPEN_NOTES[s]+f)%12];

// ── ステージ定義（フレット別・特別） ──────────────────────────
const STAGE_DEFS = [
    { id:'fret_lo',  grid:'fret', label:'開放〜3F', sub:'ローポジション', color:'#4ade80', filter:(s,f)=>f<=3 },
    { id:'fret_mid', grid:'fret', label:'5〜7F',   sub:'ミドルポジション', color:'#60a5fa', filter:(s,f)=>f>=5&&f<=7 },
    { id:'fret_hi',  grid:'fret', label:'9〜12F',  sub:'ハイポジション', color:'#a78bfa', filter:(s,f)=>f>=9 },
    { id:'natural', grid:'special', label:'ナチュラル', sub:'C D E F G A B', color:'#f5d070', filter:(s,f)=>!getNote(s,f).includes('#') },
    { id:'sharp',   grid:'special', label:'シャープ',   sub:'C# D# F# G# A#', color:'#f87171', filter:(s,f)=>getNote(s,f).includes('#') },
    { id:'all',     grid:'special', label:'全域',       sub:'全弦・全フレット', color:'#e0a835', filter:()=>true },
];

// ── 弦ステージ（レベル制） ──────────────────────────────────
const STR_LV_RANGES  = [[0,3],[5,7],[9,12],[0,12]]; // Lv1〜4
const STR_LV_LABELS  = ['開放〜3F','5〜7F','9〜12F','全F 仕上げ'];
const STR_CLEAR_TARGET = 5;   // Lv1-3: 連続正解数
const STR_FINAL_LV   = 3;     // Lv4（仕上げ）のインデックス
const STR_FINAL_CNT  = 10;    // 仕上げ問題数

const STR_LV_KEY = i => `fbattle_strlv_${i}`;
function getStrLv(i) { return Math.min(+localStorage.getItem(STR_LV_KEY(i))||0, 4); }
function setStrLv(i,v){ localStorage.setItem(STR_LV_KEY(i), v); }

function makeStrStage(strIdx) {
    const lv = getStrLv(strIdx);
    const effectiveLv = Math.min(lv, STR_FINAL_LV); // 0〜3
    const [min,max] = STR_LV_RANGES[effectiveLv];
    const isFinal  = effectiveLv === STR_FINAL_LV;
    const isMaster = lv > STR_FINAL_LV;
    return {
        id: `str${6-strIdx}`,
        strIdx, isStrStage: true, isFinalStage: isFinal,
        label: STR_JP[strIdx],
        sub: isMaster ? '★ 完全マスター' : `Lv${effectiveLv+1} ${STR_LV_LABELS[effectiveLv]}`,
        color: STR_COLORS[strIdx],
        filter: (s,f) => s===strIdx && f>=min && f<=max,
        lv, effectiveLv,
    };
}

const HI_KEY = id => `fbattle_hi_${id}`;
let gStage = STAGE_DEFS.find(s=>s.id==='all');

// ── ステージ選択UI構築 ─────────────────────────────────────────
function buildStageSelect() {
    // 弦別ステージ（レベル制カード）
    const strGrid = document.getElementById('ss-string-grid');
    for (let i=5; i>=0; i--) {  // 6弦(5)→1弦(0)
        const st = makeStrStage(i);
        const lv = getStrLv(i);
        const hi = +localStorage.getItem(HI_KEY(st.id)) || 0;


        const isMaster = lv > STR_FINAL_LV;
        const eLv = Math.min(lv, STR_FINAL_LV);
        let dotsHtml = '';
        for (let d=0; d<4; d++) {
            const cls = d < lv ? 'done' : (d === eLv ? 'current' : 'locked');
            const sym = d === STR_FINAL_LV ? '★' : d+1;
            dotsHtml += `<span class="ss-lv-dot ${cls}">${sym}</span>`;
        }

        const btn = document.createElement('button');
        btn.className = 'ss-btn';
        btn.style.setProperty('--c', st.color);
        btn.innerHTML = `
            <span class="ss-label">${st.label}</span>
            <span class="ss-sub">${STR_OPEN[i]}</span>
            <div class="ss-lv-dots">${dotsHtml}</div>
            ${isMaster
                ? `<span class="ss-lv-all-clear">★ 完全マスター</span>`
                : `<span class="ss-lv-current">Lv${eLv+1}: ${STR_LV_LABELS[eLv]}</span>`
            }
            <span class="ss-best ${hi>0?'has-score':''}">${hi>0?'BEST '+hi.toLocaleString():'—'}</span>`;
        btn.onclick = () => selectStrStage(i);
        strGrid.appendChild(btn);
    }

    // フレット別・特別ステージ
    const gridMap = { fret:'ss-fret-grid', special:'ss-special-grid' };
    STAGE_DEFS.forEach(st => {
        const grid = document.getElementById(gridMap[st.grid]);
        const hi = +localStorage.getItem(HI_KEY(st.id)) || 0;
        const btn = document.createElement('button');
        btn.className = 'ss-btn';
        btn.style.setProperty('--c', st.color);
        btn.innerHTML = `
            <span class="ss-label">${st.label}</span>
            <span class="ss-sub">${st.sub}</span>
            <span class="ss-best ${hi>0?'has-score':''}">${hi>0?'BEST '+hi.toLocaleString():'—'}</span>`;
        btn.onclick = () => selectStage(st.id);
        grid.appendChild(btn);
    });
}

function selectStrStage(strIdx) {
    gStage = makeStrStage(strIdx);
    document.getElementById('stage-bar-name').textContent = `${gStage.label}（${gStage.sub}）`;
    document.getElementById('stage-select').style.display = 'none';
    document.getElementById('game-area').style.display = 'flex';
    startGame();
}

function selectStage(id) {
    gStage = STAGE_DEFS.find(s=>s.id===id);
    document.getElementById('stage-bar-name').textContent = `${gStage.label}（${gStage.sub}）`;
    document.getElementById('stage-select').style.display = 'none';
    document.getElementById('game-area').style.display = 'flex';
    startGame();
}

function showStageSelect() {
    document.getElementById('ss-string-grid').innerHTML = '';
    document.getElementById('ss-fret-grid').innerHTML = '';
    document.getElementById('ss-special-grid').innerHTML = '';
    buildStageSelect();
    renderWeaknessStats();
    document.getElementById('game-area').style.display = 'none';
    document.getElementById('stage-select').style.display = 'flex';
}

// ── SVG キャラクター ──────────────────────────────────────────
const SVGS = {

slime:`<img src="images/enemy-slime.png" style="width:120px;height:auto;image-rendering:pixelated;image-rendering:crisp-edges;display:block;">`,

bat:`<img src="images/enemy-bat.png" width="160" height="120" style="image-rendering:pixelated;image-rendering:crisp-edges;display:block;">`,

goblin:`<img src="images/enemy-goblin.png" width="140" height="140" style="image-rendering:pixelated;image-rendering:crisp-edges;display:block;">`,

skeleton:`<img src="images/enemy-skeleton.png" width="150" height="150" style="image-rendering:pixelated;image-rendering:crisp-edges;display:block;">`,


wizard:`<img src="images/enemy-wizard.png" style="width:140px;height:auto;display:block;">`,

dragon:`<img src="images/enemy-dragon.png" style="width:200px;height:auto;image-rendering:pixelated;image-rendering:crisp-edges;display:block;">`

};

// ── 敵定義 ────────────────────────────────────────────────────
const ENEMIES = [
    { name:'スライム',   svgKey:'slime',    hp:1, xp:50,  base:100,  color:'#4ade80' },
    { name:'コウモリ',   svgKey:'bat',      hp:1, xp:60,  base:120,  color:'#a78bfa' },
    { name:'ゴブリン',   svgKey:'goblin',   hp:2, xp:100, base:200,  color:'#fb923c' },
    { name:'スケルトン', svgKey:'skeleton', hp:2, xp:120, base:250,  color:'#94a3b8' },
    { name:'ウィザード', svgKey:'wizard',   hp:3, xp:200, base:400,  color:'#818cf8', mini:true },
    { name:'ドラゴン',   svgKey:'dragon',   hp:4, xp:500, base:1000, color:'#f87171', boss:true },
];

function pickEnemy(wave) {
    if (wave%10===0 && wave>0) return ENEMIES[5];
    if (wave%5===0  && wave>0) return ENEMIES[4];
    return ENEMIES[Math.floor(Math.random()*4)];
}

}

let gSFQueue = [];
function randomSF() {
    if (gSFQueue.length === 0) {
        const valid = [];
        for (let s=0; s<6; s++)
            for (let f=0; f<=NUM_FRETS; f++)
                if (gStage.filter(s, f)) valid.push([s, f]);
        gSFQueue = valid;
        shuffle(gSFQueue);
    }
    return gSFQueue.pop();
}

// ── Audio ─────────────────────────────────────────────────────
let audioCtx=null, muted=false;
function getAudioCtx() {
    if (!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    if (audioCtx.state==='suspended') audioCtx.resume();
    return audioCtx;
}
function playNote(s,f) {
    if (muted) return;
    const ctx=getAudioCtx(), freq=BASE_FREQS[s]*Math.pow(2,f/12), t=ctx.currentTime;
    const o1=ctx.createOscillator(), o2=ctx.createOscillator();
    const fi=ctx.createBiquadFilter(), gn=ctx.createGain(), g2=ctx.createGain();
    o1.type='triangle'; o1.frequency.value=freq;
    o2.type='sawtooth'; o2.frequency.value=freq; g2.gain.value=0.12;
    fi.type='lowpass'; fi.frequency.setValueAtTime(freq*12,t); fi.frequency.exponentialRampToValueAtTime(freq*1.5,t+0.5);
    gn.gain.setValueAtTime(0.001,t); gn.gain.linearRampToValueAtTime(0.55,t+0.003); gn.gain.exponentialRampToValueAtTime(0.001,t+1.8);
    o1.connect(fi); o2.connect(g2); g2.connect(fi); fi.connect(gn); gn.connect(ctx.destination);
    o1.start(t); o2.start(t); o1.stop(t+2); o2.stop(t+2);
}
function sfx(freqs,type='triangle',vol=0.2,dur=0.15,gap=0.07) {
    if (muted) return;
    const ctx=getAudioCtx();
    freqs.forEach((freq,i)=>{
        const o=ctx.createOscillator(), g=ctx.createGain();
        o.type=type; o.frequency.value=freq;
        const st=ctx.currentTime+i*gap;
        g.gain.setValueAtTime(vol,st); g.gain.exponentialRampToValueAtTime(0.001,st+dur);
        o.connect(g); g.connect(ctx.destination); o.start(st); o.stop(st+dur+0.02);
    });
}
function sfxHit()       { sfx([900,1100],'square',0.15,0.07,0.04); }
function sfxMiss()      { sfx([220,130],'sawtooth',0.18,0.18,0.07); }
function sfxDefeat()    { sfx([523,659,784,1047],'triangle',0.22,0.32,0.08); }

function sfxStageClear(){ sfx([523,659,784,1047,784,1047,1319],'triangle',0.2,0.38,0.09); }
function sfxCombo(c)    { sfx([440+c*45],'triangle',0.15,0.13); }

const STATS_KEY = 'fbattle_stats';
function getStats() { try { return JSON.parse(localStorage.getItem(STATS_KEY))||{}; } catch{ return {}; } }

function updateStats(s, f, isOk, ms) {
    const st = getStats();
    const k = `${s}_${f}`;
    if (!st[k]) st[k] = {ok:0,ng:0,totalMs:0};
    st[k].ok += isOk?1:0;
    st[k].ng += isOk?0:1;
    st[k].totalMs += ms;
    localStorage.setItem(STATS_KEY, JSON.stringify(st));
}

function renderWeaknessStats() {
    const el = document.getElementById('stats-content');
    if (!el) return;
    const st = getStats();
    const entries = Object.entries(st)
        .map(([k,v])=>{ const [s,f]=k.split('_').map(Number); const tot=v.ok+v.ng; return {s,f,tot,acc:v.ok/tot,avgMs:v.totalMs/tot}; })
        .filter(e=>e.tot>=3)
        .sort((a,b)=>a.acc-b.acc||b.avgMs-a.avgMs)
        .slice(0,5);
    if (!entries.length) {
        el.innerHTML='<div class="stats-empty">まだデータが不足しています（各ポジション3回以上で分析開始）</div>';
        return;
    }
    el.innerHTML = entries.map(e=>{
        const lbl = e.f===0?`${STR_JP[e.s]} 開放`:`${STR_JP[e.s]} ${e.f}F`;
        const pct = Math.round(e.acc*100);
        const col = pct<40?'#f87171':pct<65?'#facc15':'#4ade80';
        const avg = (e.avgMs/1000).toFixed(1);
        return `<div class="stats-row">
            <span class="stats-pos">${lbl}</span>
            <span class="stats-note">${getNote(e.s,e.f)}</span>
            <div class="stats-bar-bg"><div class="stats-bar-fill" style="width:${pct}%;background:${col}"></div></div>
            <span class="stats-acc" style="color:${col}">${pct}%</span>
            <span class="stats-time">⏱${avg}s</span>
        </div>`;
    }).join('');
}

function askQuestion() {
    if (gBusy) return;
    gAnswered=false; clearInds();
    const [s,f] = randomSF();
    gQ={s, f, note:getNote(s,f)};
    setSpeechBubble(buildQuestionText(s,f));
    setInd(s,f,'target pop');
    renderChoices(makeChoices(gQ.note));
    setTimeout(()=>playNote(s,f), 120);
    startTimerBar();
}

function makeChoices(correct) {
    const others=NOTES.filter(n=>n!==correct); shuffle(others);
    const arr=[correct,...others.slice(0,3)]; shuffle(arr); return arr;
}
function renderChoices(choices) {
    const grid=document.getElementById('choices-grid'); grid.innerHTML='';
    choices.forEach(note=>{
        const btn=document.createElement('button');
        btn.className='choice-btn'; btn.textContent=note;
        btn.onclick=()=>onAnswer(note,btn); grid.appendChild(btn);
    });
}

function onAnswer(selected,btn) {
    if (gAnswered||gBusy) return;
    gAnswered=true;
    stopTimerBar();
    const elapsed = Date.now() - gQuestionTime;
    const timePts = Math.max(0, Math.floor((TIME_LIMIT - Math.min(elapsed,TIME_LIMIT)) / 100));
    const isOk=selected===gQ.note;
    updateStats(gQ.s, gQ.f, isOk, elapsed);

    document.querySelectorAll('.choice-btn').forEach(b=>{
        b.disabled=true;
        if (b.textContent===gQ.note) b.classList.add('ok');
    });
    if (!isOk) btn.classList.add('ng');
    setInd(gQ.s,gQ.f,isOk?'correct pop':'wrong pop',gQ.note);

    if (isOk) {
        gCombo++;
        const mult=Math.min(1+(gCombo-1)*0.3,3.5);
        const crit=Math.random()<0.15;
        const basePts=Math.floor(gEnemy.base/gEnemy.hp*mult)*(crit?2:1);
        const pts=basePts+timePts;
        const hi=getStageHi();
        gScore+=pts;
        if (gScore>hi) { setStageHi(gScore); if (gScore>hi) setTimeout(sfxLevelUp,250); }

        sfxHit();
        if (gCombo>=3) sfxCombo(Math.min(gCombo,12));

        const sr=document.getElementById('enemy-sprite').getBoundingClientRect();
        const cx=sr.left+sr.width/2;
        floatText(`+${pts.toLocaleString()}`,cx,sr.top-8,crit?'#f87171':'var(--gold)',crit?'2rem':'1.8rem');
        if (crit) floatText('CRITICAL!!',cx,sr.top-46,'#fb923c','1.2rem');
        const elSec=(elapsed/1000).toFixed(1);
        if (timePts>0) floatText(`⚡+${timePts}`,cx,sr.top-62,'#60a5fa','0.9rem');
        document.getElementById('timer-label').textContent=elSec+'s';

        enemyHit(); updateCombo(); updateHUD();
        gEnemyHP--; updateEnemyHP();

        // 弦ステージ：連続正解 / 仕上げカウント
        if (gStage.isStrStage) {
            if (gStage.isFinalStage) {
                gQuizCount++; gQuizCorrect++;
                updateStreakBar();
                if (gQuizCount >= STR_FINAL_CNT) {
                    gBusy=true;
                    const strIdx = gStage.strIdx;
                    setStrLv(strIdx, STR_FINAL_LV + 1); // master
                    setTimeout(()=>{
                        sfxStageClear(); burstFireworks();
                        showOverlay(`★ 完全マスター！ ${gQuizCorrect}/${STR_FINAL_CNT}正解`,'#f5d070','rgba(245,208,112,0.12)',()=>{});
                        setTimeout(()=>showStageSelect(), 2600);
                    }, 480);
                    return;
                }
            } else {
                gConsecutive++;
                updateStreakBar();
                if (gConsecutive >= STR_CLEAR_TARGET) {
                    gBusy=true;
                    const nextLv = gStage.effectiveLv + 1;
                    const strIdx = gStage.strIdx;
                    setStrLv(strIdx, nextLv);
                    setTimeout(()=>{
                        sfxStageClear();
                        showOverlay(`Lv${nextLv+1} へ進む！`,'#4ade80','rgba(74,222,128,0.10)',()=>{});
                        setTimeout(()=>{
                            gStage = makeStrStage(strIdx);
                            document.getElementById('stage-bar-name').textContent = `${gStage.label}（${gStage.sub}）`;
                            gConsecutive=0; gSFQueue=[];
                            updateStreakBar();
                            gBusy=false;
                            askQuestion();
                        }, 2200);
                    }, 480);
                    return;
                }
            }
        }

        if (gEnemyHP<=0) {
            gBusy=true;
            setSpeechBubble('やられた…！');
            setResult('✨ 撃破！','ok');
            setTimeout(()=>defeatEnemy(),480);
        } else {
            setSpeechBubble('ぐっ…！');
            setResult(`正解！ ${(elapsed/1000).toFixed(1)}秒`,'ok');
            setTimeout(()=>askQuestion(), 900);
        }
    } else {
        // 弦ステージ：不正解
        if (gStage.isStrStage) {
            if (gStage.isFinalStage) {
                gQuizCount++;
                updateStreakBar();
                if (gQuizCount >= STR_FINAL_CNT) {
                    gBusy=true;
                    const strIdx = gStage.strIdx;
                    setTimeout(()=>{
                        sfxStageClear();
                        showOverlay(`仕上げ終了 ${gQuizCorrect}/${STR_FINAL_CNT}正解`,'#60a5fa','rgba(96,165,250,0.10)',()=>{});
                        setTimeout(()=>showStageSelect(), 2600);
                    }, 1400);
                    return;
                }
            } else {
                gConsecutive=0;
                updateStreakBar();
            }
        }
        gCombo=0; gLives=Math.max(0,gLives-1);
        updateCombo(); updateHUD(); sfxMiss(); playerHit();
        setSpeechBubble('フハハ！ 違うぞ！');
        if (gLives===0) {
            gLives=3; setResult('ピンチ！ 復活！','miss');
        } else {
            setResult(`不正解… 正解は ${gQ.note}`,'miss');
        }
        showExplainModal(false, ()=>askQuestion());
    }
}

// ── 音の導き方解説 ────────────────────────────────────────────
function buildIntervalExplanation(s, f) {
    const note     = getNote(s, f);
    const openNote = NOTES[OPEN_NOTES[s]];
    const rows     = [];

    // 弦関係の説明（6弦/5弦/1弦を軸に）
    if (s === 5) {
        rows.push(`<div class="exp-row"><span class="exp-anchor">6弦</span><span class="exp-int">は基準のE弦（最も低い弦）</span></div>`);
    } else if (s === 4) {
        rows.push(`<div class="exp-row"><span class="exp-anchor">6弦(E)</span><span class="exp-arrow"> → </span><span class="exp-anchor">5弦(A)</span><span class="exp-int"> ：完全4度(5半音)上</span></div>`);
    } else if (s === 3) {
        rows.push(`<div class="exp-row"><span class="exp-anchor">5弦(A)</span><span class="exp-arrow"> → </span><span class="exp-anchor">4弦(D)</span><span class="exp-int"> ：完全4度(5半音)上</span></div>`);
    } else if (s === 2) {
        rows.push(`<div class="exp-row"><span class="exp-anchor">5弦(A)</span><span class="exp-arrow"> → </span><span class="exp-anchor">4弦(D)</span><span class="exp-int"> ：完全4度上</span><span class="exp-arrow"> → </span><span class="exp-anchor">3弦(G)</span><span class="exp-int"> ：完全4度上</span></div>`);
    } else if (s === 1) {
        rows.push(`<div class="exp-row"><span class="exp-anchor">1弦(E)</span><span class="exp-arrow"> → </span><span class="exp-anchor">2弦(B)</span><span class="exp-int"> ：完全4度(5半音)下</span></div>`);
        rows.push(`<div class="exp-special">※ 3弦→2弦のみ長3度(4半音)。他の隣接弦はすべて完全4度</div>`);
    } else if (s === 0) {
        rows.push(`<div class="exp-row"><span class="exp-anchor">1弦</span><span class="exp-int">は6弦と同じ音名のE弦（2オクターブ上）</span></div>`);
    }

    // フレット計算
    if (f === 0) {
        rows.push(`<div class="exp-steps"><span class="exp-open">${STR_JP[s]}開放 = </span><span class="exp-answer">${note}</span></div>`);
    } else {
        const open = OPEN_NOTES[s];
        const stepNotes = [];
        for (let i=1; i<=f; i++) stepNotes.push(NOTES[(open+i)%12]);
        const display = stepNotes.length > 7
            ? [...stepNotes.slice(0,4), '…', stepNotes[stepNotes.length-1]]
            : stepNotes;
        rows.push(`<div class="exp-steps">`
            + `<span class="exp-open">${STR_JP[s]}開放(${openNote})</span>`
            + ` + ${f}フレット：${openNote} → ${display.join(' → ')} = `
            + `<span class="exp-answer">${note}</span>`
            + `</div>`);
    }

    return rows.join('');
}

let gNextAction = null;

function showExplainModal(isOk, nextFn) {
    document.getElementById('explain-modal-result').innerHTML = isOk
        ? `<span style="color:var(--ok)">✓ 正解！</span>`
        : `<span style="color:var(--ng)">✗ 不正解… 正解は <span style="color:var(--gold);font-weight:900">${gQ.note}</span></span>`;
    document.getElementById('explain-modal-body').innerHTML = buildIntervalExplanation(gQ.s, gQ.f);
    gNextAction = nextFn;
    document.getElementById('explain-modal').classList.add('open');
}

function onExplainNext() {
    document.getElementById('explain-modal').classList.remove('open');
    if (gNextAction) { const fn = gNextAction; gNextAction = null; fn(); }
}

// ── ビジュアルエフェクト ───────────────────────────────────────
function floatText(text,x,y,color,size='1.5rem'){
    const el=document.createElement('div'); el.className='float-txt'; el.textContent=text;
    el.style.cssText=`left:${x}px;top:${y}px;color:${color};font-size:${size};`;
    document.body.appendChild(el); setTimeout(()=>el.remove(),1150);
}
function spawnParticles(cx,cy,color,count=15){
    for(let i=0;i<count;i++){
        const p=document.createElement('div'); p.className='particle';
        const angle=(Math.PI*2*i/count)+Math.random()*0.5;
        const spd=55+Math.random()*105, w=6+Math.random()*8;
        p.style.cssText=`left:${cx}px;top:${cy}px;width:${w}px;height:${w}px;background:${color};--dx:${Math.cos(angle)*spd}px;--dy:${Math.sin(angle)*spd-38}px;`;
        document.body.appendChild(p); setTimeout(()=>p.remove(),1000);
    }
}
function spawnStars(cx,cy,count=6){
    const stars=['⭐','✨','💫','⚡'];
    for(let i=0;i<count;i++){
        const p=document.createElement('div'); p.className='star-particle';
        p.textContent=stars[Math.floor(Math.random()*stars.length)];
        const angle=(Math.PI*2*i/count)+Math.random()*0.8;
        const spd=40+Math.random()*72;
        p.style.cssText=`left:${cx-10}px;top:${cy-10}px;--dx:${Math.cos(angle)*spd}px;--dy:${Math.sin(angle)*spd-42}px;`;
        document.body.appendChild(p); setTimeout(()=>p.remove(),1100);
    }
}
function burstFireworks(){
    const palette=['#f5d070','#4ade80','#60a5fa','#f87171','#a78bfa','#fb923c'];
    for(let i=0;i<7;i++){
        setTimeout(()=>{
            spawnParticles(Math.random()*window.innerWidth,50+Math.random()*window.innerHeight*0.45,palette[Math.floor(Math.random()*palette.length)],22);
            spawnStars(Math.random()*window.innerWidth,50+Math.random()*window.innerHeight*0.45,5);
        },i*200);
    }
}
function showOverlay(text,color,bg,soundFn){
    soundFn();
    const div=document.createElement('div'); div.className='overlay-anim'; div.style.background=bg;
    div.innerHTML=`<div class="overlay-text" style="color:${color};text-shadow:0 0 60px ${color};">${text}</div>`;
    document.body.appendChild(div); setTimeout(()=>div.remove(),2100);
}
function shuffle(a){
    for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
}

// ── Init ──────────────────────────────────────────────────────
buildStageSelect();
renderWeaknessStats();
